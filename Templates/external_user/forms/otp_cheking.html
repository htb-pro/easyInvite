<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card login-card p-4">
                <h3 class="text-center mb-4">Connexion EasyInvite</h3>
                
                <form id="phoneForm" onsubmit="sendOTP(event)">
                    <div class="mb-3">
                        <label class="form-label">Numéro de téléphone</label>
                        <input type="text" id="phone" class="form-control" placeholder="+243..." required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Recevoir le code</button>
                </form>

                <form id="otpForm" class="d-none" onsubmit="verifyOTP(event)">
                    <div class="mb-3">
                        <label class="form-label">Code reçu par SMS</label>
                        <input type="text" id="otpCode" class="form-control" maxlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Valider</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function sendOTP(e) {
        e.preventDefault();
        // Ici, tu fais un fetch() vers ton API /send-otp
        document.getElementById('phoneForm').classList.add('d-none');
        document.getElementById('otpForm').classList.remove('d-none');
        alert("Code envoyé !");
    }

    function verifyOTP(e) {
        e.preventDefault();
        // Ici, tu fais un fetch() vers ton API /verify-otp
        window.location.href = "/dashboard"; // Redirection après succès
    }
</script>
</body>
</html>
