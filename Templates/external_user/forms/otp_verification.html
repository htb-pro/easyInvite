<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification - EasyInvite</title>
    <link href="/static/Css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #0F172A; color: #ffffff; }
        .auth-card { background-color: #1E293B; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; }
        .text-center a, p { color: #9CA3AF; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-5">
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-warning">EasyTicket</h2>
                </div>

                <div class="p-4 auth-card shadow">
                    <h5 class="mb-1 fw-bold text-center">Vérification du code</h5>
                    <p class="text-center small mb-4">
                        Entrez le code secret envoyé par email a l'adresse mail<br>
                    </p>
                    
                    <!-- Ajout d'un ID pour le cibler en JS et suppression de l'action directe -->
                    <form id="otpForm">
                        <!-- Zone de notification dynamique pour les erreurs -->
                        <div id="alertZone" class="alert alert-danger d-none">
                            <span id="alertText"></span>
                        </div>

                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        
                        <div class="mb-4">
                            <!-- Le name="code_saisi" correspond maintenant EXACTEMENT à l'argument de ta route FastAPI -->
                            <input type="text" name="otp_input" id="otp_entered" 
                                   class="form-control bg-dark text-white text-center fw-bold fs-3 border-secondary" 
                                   placeholder="0 0 0 0" minlength="6" maxlength="6" required autocomplete="off" autofocus>
                        </div>
                        
                        <button type="submit" id="btnSubmit" class="btn btn-warning w-100 fw-bold text-dark">
                            <span id="btnText">Valider</span>
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="/auth/login" class="small">Retour / Changer de numéro</a>
                    </div>

                </div>

            </div>
        </div>
    </div>

<script>
    const otpForm = document.getElementById('otpForm');
    const alertZone = document.getElementById('alertZone');
    const alertText = document.getElementById('alertText');
    const btnSubmit = document.getElementById('btnSubmit');
    const btnText = document.getElementById('btnText');

    otpForm.addEventListener('submit', async (e) => {
        e.preventDefault(); // On empêche le rechargement de la page

        // Verrouillage du bouton pendant le traitement
        btnSubmit.disabled = true;
        btnText.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Vérification...`;
        alertZone.classList.add('d-none');

        const formData = new FormData(otpForm);

        try {
            const response = await fetch('/auth/verify-otp', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (response.ok && data.status === "SUCCESS") {
                // 🟢 SUCCÈS : On redirige vers la page finale en transmettant le token de sécurité
                window.location.href = `/user/reset_password?token=${data.reset_token}`;
            } else {
                // ❌ ERREUR (Code faux, expiré, bloqué, etc.)
                alertText.textContent = data.detail;
                alertZone.classList.remove('d-none');
                
                // Si l'erreur est un code incorrect, on peut vider le champ pour qu'il réessaie
                if (data.status === "INVALID_CODE") {
                    document.getElementById('otp_entered').value = '';
                    document.getElementById('otp_entered').focus();
                }
            }
        } catch (error) {
            alertText.textContent = "Une erreur réseau est survenue. Veuillez réessayer.";
            alertZone.classList.remove('d-none');
        } finally {
            // Libération du bouton
            btnSubmit.disabled = false;
            btnText.textContent = "Valider";
        }
    });
</script>
</body>
</html>
