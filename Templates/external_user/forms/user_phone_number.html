<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification - EasyInvite</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (Nécessaire pour tes icônes de profil) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #0F172A; color: #ffffff; }
        .auth-card { background-color: #1E293B; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; }
        .text-center a, p { color: #9CA3AF; text-decoration: none; }
        .text-center a:hover { color: #ffc107; }
        input::placeholder { color: silver !important; }
        
        /* Style personnalisé pour le groupe de sélection */
        .custom-select-group .input-group-text {
            border-color: rgba(255, 255, 255, 0.1);
            transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        .custom-select {
            padding-top: 0.6rem;
            padding-bottom: 0.6rem;
            cursor: pointer;
            font-size: 0.95rem;
            border-color: rgba(255, 255, 255, 0.1);
            transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        /* Effet de focus pro EasyInvite */
        .custom-select:focus,
        .custom-select-group:focus-within .input-group-text,
        input[type="tel"]:focus,
        .input-group:focus-within .input-group-text {
            color: #fff !important;
            background-color: #1E293B !important;
            border-color: #ffc107 !important;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.15) !important;
        }

        /* Style de la première option (Placeholder de sélection) */
        .custom-select option:first-child { color: #6c757d; }

        /* Espacement des options dans la liste déroulante */
        .custom-select option {
            padding: 10px;
            background-color: #1E293B;
            color: white;
        }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-5">
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-warning">EasyTicket</h2>
                </div>

                <div class="p-4 auth-card shadow">
                    <div class="card p-4 shadow-lg border-0" style="background-color: #0F172A; max-width: 400px; width: 100%; border-radius: 16px;">
                        <div class="text-center mb-3">
                            <h4 class="text-white fw-bold">Mot de passe oublié ?</h4>
                            <p class="text-secondary small">Entrez votre numéro de téléphone. Un code de vérification OTP vous sera envoyé par message.</p>
                        </div>

                        <!-- 🚨 Zone dynamique pour afficher les messages de succès ou d'erreur JSON -->
                        <div id="response-alert" class="alert d-none small text-center p-2 mb-3" role="alert"></div>

                        <!-- Formulaire muni d'un ID pour le script asynchrone -->
                        <form id="form-forgot-password">
                            <input type="hidden" id="csrf_token" name="csrf_token" value="{{csrf_token}}">
                            
                            <div class="mb-4">
                                <label class="form-label text-white-50 small fw-semibold">Numéro de téléphone</label>
                                <div class="input-group">
                                    <span class="input-group-text text-secondary border-0" style="background-color: #1E293B; border-radius: 12px 0 0 12px;">+243</span>
                                    <input 
                                        type="tel" 
                                        name="phone_input" 
                                        id="phone_input"
                                        class="form-control text-white border-0" 
                                        placeholder="812345678" 
                                        pattern="[0-9]{9}" 
                                        required
                                        style="background-color: #1E293B; border-radius: 0 12px 12px 0; padding: 12px;"
                                    >
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="user_type" class="form-label fw-semibold text-secondary small text-uppercase tracking-wider">
                                    <i class="bi bi-person-badge me-1"></i> Quel est votre profil ?
                                </label>
                                <div class="input-group custom-select-group">
                                    <span class="input-group-text text-secondary border-0 border-end-0" style="background-color: #1E293B; border-radius: 12px 0 0 12px;">
                                        <i class="bi bi-person-circle"></i>
                                    </span>
                                    <select name="user_type" id="user_type" class="form-select custom-select text-white border-0 border-start-0" style="background-color: #1E293B; border-radius: 0 12px 12px 0; padding: 12px;" required>
                                        <option value="" disabled selected hidden>Choisissez votre type de compte...</option>
                                        <option value="external_user">🎟️ Je suis un Participant (Achat de billets)</option>
                                        <option value="organizer">💼 Je suis un Organisateur (Gestion d'événements)</option>
                                    </select>
                                </div>
                                <div class="form-text text-secondary small mt-1">
                                    Sélectionnez l'espace que vous souhaitez dépanner.
                                </div>
                            </div>

                            <button type="submit" id="submit-btn" class="btn btn-warning w-100 fw-semibold" style="border-radius: 12px; padding: 12px;">
                                Recevoir le code OTP
                            </button>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-3">
                    <a href="/auth/login" class="small">Retour / Changer de numéro</a>
                </div>

            </div>
        </div>
    </div>

    <!-- Script de soumission AJAX/Fetch unifié -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const forgotForm = document.getElementById("form-forgot-password");
            const responseAlert = document.getElementById("response-alert");
            const submitBtn = document.getElementById("submit-btn");

            if (forgotForm) {
                forgotForm.addEventListener("submit", async function (event) {
                    event.preventDefault();

                    // Réinitialisation de l'alerte graphique
                    responseAlert.classList.add("d-none");
                    responseAlert.classList.remove("alert-success", "alert-danger");
                    responseAlert.innerHTML = "";

                    // Désactivation du bouton pour éviter le double-clic
                    submitBtn.disabled = true;
                    submitBtn.textContent = "Traitement en cours...";

                    try {
                        const csrfTokenElement = document.getElementById("csrf_token");
                        const formData = new FormData(forgotForm);
                        if (csrfTokenElement) {
                            formData.set("csrf_token", csrfTokenElement.value);
                        }

                        // Envoi à la route unique configurée en arrière-plan
                        const response = await fetch("/auth/forgot_password", {
                            method: "POST",
                            body: formData
                        });

                        const data = await response.json();

                        if (!response.ok) {
                            // Cas d'erreur renvoyée par FastAPI (400, 500, etc.)
                            responseAlert.classList.remove("d-none");
                            responseAlert.classList.add("alert-danger");
                            responseAlert.textContent = data.detail || "Une erreur est survenue. Veuillez réessayer.";
                            
                            submitBtn.disabled = false;
                            submitBtn.textContent = "Recevoir le code OTP";
                            return;
                        }

                        // Dans ton bloc de succès (fetch response.ok) :
                        responseAlert.classList.remove("d-none");
                        responseAlert.classList.add("alert-success");
                        responseAlert.textContent = data.message;

                        // 💡 Redirection vers l'écran où il va taper le code à 6 chiffres reçu par SMS
                        setTimeout(() => {
                            window.location.href = "/user/otp/form"; 
                        }, 2000);

                    } catch (error) {
                        console.error("Erreur réseau :", error);
                        responseAlert.classList.remove("d-none");
                        responseAlert.classList.add("alert-danger");
                        responseAlert.textContent = "Impossible de joindre le serveur. Vérifiez votre connexion.";
                        
                        submitBtn.disabled = false;
                        submitBtn.textContent = "Recevoir le code OTP";
                    }
                });
            }
        });
    </script>
</body>
</html>
