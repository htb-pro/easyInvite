<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation - EasyInvite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #0F172A; color: #ffffff; }
        .auth-card { background-color: #1E293B; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; }
        .text-center a, p { color: #9CA3AF; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-5">
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-warning">EasyTicket</h2>
                </div>

                <div class="p-4 auth-card shadow">
                    <h5 class="mb-1 fw-bold text-center">Réinitialisation du mot de passe</h5>
                    <p class="text-center small mb-4">
                        Entrez votre nouveau mot de passe <br>
                        <!-- 💡 Utilisation de la bonne variable de session passée par ton GET -->
                        <strong class="text-warning font-monospace">{{ request.session.get('reset_user_email') }}</strong>
                    </p>
                    
                    <!-- 🟢 Ajout d'un ID pour l'intercepter proprement en JS -->
                    <form id="resetPasswordForm">
                        
                        <!-- Zone d'alerte dynamique pour afficher les erreurs de Prod (Mismatch, trop court, etc.) -->
                        <div id="alertZone" class="alert alert-danger d-none animate fade show">
                            <span id="alertText"></span>
                        </div>

                        <!-- Zone de succès dynamique -->
                        <div id="successZone" class="alert alert-success d-none animate fade show">
                            <span><i class="bi bi-check-circle-fill"></i> Mot de passe modifié ! Redirection...</span>
                        </div>

                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <input type="hidden" name="token_input" value="{{ reset_token }}">
                        
                        <div class="mb-3">
                            <label class="text-white small mb-1">Nouveau mot de passe</label>
                            <input type="password" name="new_password" id="new_password" class="form-control bg-dark text-white border-secondary" required minlength="8">
                        </div>
                        
                        <div class="mb-4">
                            <label class="text-white small mb-1">Confirmer le mot de passe</label>
                            <input type="password" name="confirm_password" id="confirm_password" class="form-control bg-dark text-white border-secondary" required minlength="8">
                        </div>
                        
                        <!-- 🟢 Changement de btn-primary vers btn-warning pour respecter ton thème -->
                        <button type="submit" id="btnSubmit" class="btn btn-warning w-100 fw-bold text-dark">
                            <span id="btnText">Mettre à jour le mot de passe</span>
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="/auth/login" class="small">Retour / Changer de numéro</a>
                    </div>

                </div>

            </div>
        </div>
    </div>

<script>
    const form = document.getElementById('resetPasswordForm');
    const alertZone = document.getElementById('alertZone');
    const alertText = document.getElementById('alertText');
    const successZone = document.getElementById('successZone');
    const btnSubmit = document.getElementById('btnSubmit');
    const btnText = document.getElementById('btnText');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Réinitialisation des états visuels
        alertZone.classList.add('d-none');
        successZone.classList.add('d-none');

        const newPwd = document.getElementById('new_password').value;
        const confirmPwd = document.getElementById('confirm_password').value;

        // 🛡️ Pré-validation Frontend rapide
        if (newPwd !== confirmPwd) {
            alertText.textContent = "Les deux mots de passe ne correspondent pas.";
            alertZone.classList.remove('d-none');
            return;
        }

        if (newPwd.length < 8) {
            alertText.textContent = "Le mot de passe doit contenir au moins 8 caractères.";
            alertZone.classList.remove('d-none');
            return;
        }

        // Verrouillage du bouton pendant l'envoi au serveur
        btnSubmit.disabled = true;
        btnText.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Traitement...`;

        const formData = new FormData(form);

        try {
            // 🟢 Appel exact de ta route POST optimisée
            const response = await fetch('/auth/reset-password-form', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (response.ok && data.status === "PASSWORD_CHANGED") {
                // Succès complet
                successZone.classList.remove('d-none');
                form.reset();
                
                // Redirection après 2 secondes vers la page de login
                setTimeout(() => {
                    window.location.href = "/auth/login";
                }, 2000);
            } else {
                // Gestion des échecs renvoyés par la Prod (TOKEN_EXPIRED, USER_LOST, etc.)
                alertText.textContent = data.detail || "Une erreur est survenue.";
                alertZone.classList.remove('d-none');
                btnSubmit.disabled = false;
                btnText.textContent = "Mettre à jour le mot de passe";
            }
        } catch (error) {
            alertText.textContent = "Erreur réseau. Impossible de joindre le serveur.";
            alertZone.classList.remove('d-none');
            btnSubmit.disabled = false;
            btnText.textContent = "Mettre à jour le mot de passe";
        }
    });
</script>
</body>
</html>
