<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique</title>
    <link rel="stylesheet" href="/static/Css/bootstrap.min.css">
    <script src="/static/Js/bootstrap.bundle.js"></script>
</head>
<style>
    body
    {
        background-color: #0F172A;
    }
</style>
<body>
    <section id="section-historique" class="container pt-4 px-3 app-section">
    
    <div class="mb-4">
        <h5 class="text-secondary small fw-bold text-uppercase mb-1">Mes Souvenirs</h5>
        <h2 class="fw-bold text-white">Historique ⏳</h2>
    </div>

    <div class="d-flex gap-2 mb-4">
        <button class="btn btn-warning btn-sm rounded-pill px-3 fw-semibold text-dark">Tous</button>
        <button class="btn btn-outline-light-custom btn-sm rounded-pill px-3" style="color: #CBD5E1;">Participés</button>
        <button class="btn btn-outline-light-custom btn-sm rounded-pill px-3" style="color: #CBD5E1;">Absents</button>
    </div>

    <div class="card border-0 mb-3" style="background-color: #1E293B; border-radius: 14px; opacity: 0.85;">
        <div class="card-body p-3">
            <div class="d-flex align-items-center mb-2">
                <div class="rounded-3 d-flex align-items-center justify-content-center text-secondary" 
                     style="width: 50px; height: 50px; background-color: #0F172A; min-width: 50px;">
                    <i class="bi bi-award fs-4"></i>
                </div>
                <div class="ms-3 flex-grow-1 text-truncate">
                    <span class="badge bg-success-subtle text-success mb-1" style="font-size: 0.65rem; fw-bold;">✓ PARTICIPÉ</span>
                    <h6 class="fw-bold text-white mb-0 text-truncate">Tech Forum Katanga 2025</h6>
                    <small class="text-secondary" style="font-size: 0.75rem;">Fini le 14 Nov 2025 • Karavia</small>
                </div>
            </div>
            
            <hr style="border-top: 1px dashed #334155; margin: 10px 0;">
            
            <div class="d-flex gap-2">
                <button class="btn btn-outline-light-custom btn-sm w-50 py-1.5" style="font-size: 0.8rem;">
                    <i class="bi bi-file-earmark-text me-1"></i>Facture
                </button>
                <button class="btn btn-warning btn-sm w-50 py-1.5 text-dark" style="font-size: 0.8rem;">
                    <i class="bi bi-star me-1"></i>Noter l'event
                </button>
            </div>
        </div>
    </div>

    <div class="card border-0 mb-3" style="background-color: #1E293B; border-radius: 14px; opacity: 0.6;">
        <div class="card-body p-3">
            <div class="d-flex align-items-center">
                <div class="rounded-3 d-flex align-items-center justify-content-center text-secondary" 
                     style="width: 50px; height: 50px; background-color: #0F172A; min-width: 50px;">
                    <i class="bi bi-music-note-list fs-4"></i>
                </div>
                <div class="ms-3 flex-grow-1 text-truncate">
                    <span class="badge bg-secondary-subtle text-secondary mb-1" style="font-size: 0.65rem;">❌ ABSENT</span>
                    <h6 class="fw-bold text-white-50 mb-0 text-truncate">Concert Acoustique Privé</h6>
                    <small class="text-secondary" style="font-size: 0.75rem;">Fini le 22 Janv 2026 • Hypnose</small>
                </div>
            </div>
        </div>
    </div>

</section>
</body>
</html>
