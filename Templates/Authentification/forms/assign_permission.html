<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Assignation des Permissions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body {
        font-family: "Segoe UI", system-ui, sans-serif;
        min-height: 100vh;
        background-color: #0b1c2d;
        position: relative;
        overflow-x: hidden;
        }

        /* ===== BACKGROUND GEOMETRIQUE ===== */
        body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
            linear-gradient(135deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
            linear-gradient(225deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
            linear-gradient(315deg, rgba(255,255,255,0.03) 25%, transparent 25%),
            linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%);
        background-size: 120px 120px;
        z-index: 0;
        }
        .card
        {
          background-color : rgba(255,255,255,0.1);
          padding:5px;
        }
        label
        {
            color:white;
        }
        .table
        {
            background-color:;
        }
    </style>
<body>
<div class="m-3 " style="position: relative;">
    <a href="{{url_for('users_list')}}" class="btn btn-outline-primary text-light btn-sm">
        ← Retour à la liste
    </a>
</div>
<div class="container mt-5">
    <h3 class="mb-4 text-light">Assignation des permissions aux rôles</h3>

    {% for role in roles %}
    <div class="card mb-4">
        <div class="card-header bg-dark text-white">
            {{ role.name }}
        </div>
        <div class="card-body">
            <form method="POST" action="/assign-permissions">
                <input type="hidden" name="role_id" value="{{ role.id }}">

                <div class="row">
                    {% for permission in permissions %}
                    <div class="col-md-3 mb-2">
                        <div class="form-check">
                            <input 
                                class="form-check-input"
                                type="checkbox"
                                name="permission_ids"
                                value="{{ permission.id }}"
                           
                            > <!-- if permission in role.permissions  checked  endif -->
                            <label class="form-check-label">
                                {{ permission.name }}
                            </label>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <button type="submit" class="btn btn-primary mt-3">
                    Enregistrer
                </button>
            </form>
        </div>
    </div>
    {% endfor %}

</div>

</body>
</html>
