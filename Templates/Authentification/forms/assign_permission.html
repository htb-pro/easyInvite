<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Assignation des Permissions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="m-3 " style="position: relative;">
    <a href="{{url_for('params')}}" class="btn btn-outline-primary text-primary btn-sm">
        ← Retour à l'accueila liste
    </a>
</div>
<div class="container mt-5">
    <h3 class="mb-4 text-dark">Assignation des permissions aux rôles</h3>

    {% for role in roles %}
    <div class="card mb-4">
        <div class="card-header bg-dark text-white">
            {{ role.name }}
        </div>
        <div class="card-body">
            <form method="POST" action="/assign-permissions">
                <input type="hidden" name="role_id" value="{{ role.id }}">

                <div class="row">
                    {% for permission in permissions %}
                    <div class="col-md-3 mb-2">
                        <div class="form-check">
                            <input 
                                class="form-check-input"
                                type="checkbox"
                                name="permission_ids"
                                value="{{ permission.id }}"
                           
                            > <!-- if permission in role.permissions  checked  endif -->
                            <label class="form-check-label">
                                {{ permission.name }}
                            </label>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <button type="submit" class="btn btn-primary mt-3">
                    Enregistrer
                </button>
            </form>
        </div>
    </div>
    {% endfor %}

</div>
</body>
</html>
