<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Formulaires</title>
</head>
<body>
<div class="m-3 " style="position: relative;">
    <a href="{{url_for('params')}}" class="btn btn-outline-primary text-primary btn-sm">
        ← Retour à l'accueil
    </a>
</div>
    <div class="row g-4 d-flex flex-row justify-content-center align-items-center">
        <!-- Card Formulaire 1 -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header text-primary">
                    Créer un role
                </div>

                <div class="card-body">
                    <form method="post" action="/create_role">
                        <div class="mb-3">
                            {%if existing_role %}
                            <div class="alert alert-danger">{{existing_role}}</div>
                            {%endif%}
                        </div>
                        <div class="mb-3">
                        <input type="text" class="form-control" name="role_name" placeholder="Nom" required>
                        </div>
                        <div class="mb-3 d-grid">
                            <button type="submit" class="btn btn-primary">Créer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header text-primary">
                    Créer une permission
                </div>

                <div class="card-body">
                    <form method="post" action="/create_permission">
                        <div class="mb-3">
                            {%if existing_perms %}
                            <div class="alert alert-danger">{{existing_perms}}</div>
                            {%endif%}
                        </div>
                        <div class="mb-3">
                        <input type="text" class="form-control" name="permission_name" placeholder="Nom"  required>
                        </div>
                        <div class="mb-3 d-grid">
                            <button type="submit" class="btn btn-primary">Créer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Card Formulaire 2 -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header text-primary">
                    Créer un groupe
                </div>

                <div class="card-body">
                    <form method="post" action="/create_group">
                        <div class="mb-3">
                            {%if group_existing_message %}
                            <div class="alert alert-danger">{{group_existing_message}}</div>
                            {%endif%}
                        </div>
                        <div class="mb-3">
                        <input type="text" class="form-control" name="group_name" placeholder="Nom" required>
                        </div>
                        <div class="mb-3 d-grid">
                            <button type="submit" class="btn btn-primary">Créer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>



<script>
    setTimeout(() => {
        const alert = document.querySelector(".alert");
        if (alert) {
            alert.classList.remove("show");
            alert.classList.add("fade");
            setTimeout(() => alert.remove(), 500);
        }
    }, 3000); // disparaît après 3 secondes
</script>
</body>
</html>
