<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Formulaires</title>
</head>
<style>
    body {
        font-family: "Segoe UI", system-ui, sans-serif;
        min-height: 100vh;
        background-color: #0b1c2d;
        position: relative;
        overflow-x: hidden;
        }

        /* ===== BACKGROUND GEOMETRIQUE ===== */
        body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
            linear-gradient(135deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
            linear-gradient(225deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
            linear-gradient(315deg, rgba(255,255,255,0.03) 25%, transparent 25%),
            linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%);
        background-size: 120px 120px;
        z-index: 0;
        }
        .card-header
        {
            background-color : rgb(17, 98, 220);
        }
        .card
        {
          background-color : rgba(15, 90, 202, 0.1);
          padding:5px;
        }
        label
        {
            color:white;
        }
    </style>
<body>
        <!-- Card Formulaire 2 -->
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header text-light">
                    Modification d'un groupe
                </div>

                <div class="card-body">
                    <form method="post" action="/create_group">
                        <div class="mb-3">
                            {%if existing_message %}
                            <div class="alert alert-danger">{{existing_message}}</div>
                            {%endif%}
                        </div>
                        <div class="mb-3">
                        <input type="text" class="form-control" name="group_name" placeholder="Nom" required>
                        </div>
                        <div class="mb-3 d-grid">
                            <button type="submit" class="btn btn-primary">Créer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
    setTimeout(() => {
        const alert = document.querySelector(".alert");
        if (alert) {
            alert.classList.remove("show");
            alert.classList.add("fade");
            setTimeout(() => alert.remove(), 500);
        }
    }, 3000); // disparaît après 3 secondes
</script>
</body>
</html>
