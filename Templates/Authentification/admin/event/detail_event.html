<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détail de l'événement</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="/static/Css/bootstrap.min.css">
</head>
<style>
    body {
        font-family: "Segoe UI", system-ui, sans-serif;
        min-height: 100vh;
        background-color: #0b1c2d;
        position: relative;
        overflow-x: hidden;
        }

        /* ===== BACKGROUND GEOMETRIQUE ===== */
        body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
            linear-gradient(135deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
            linear-gradient(225deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
            linear-gradient(315deg, rgba(255,255,255,0.03) 25%, transparent 25%),
            linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%);
        background-size: 120px 120px;
        z-index: 0;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 20px;
            background : rgb(255,255,255,0.2);
            color :rgb(236, 236, 236);
        }
        .badge
        {
            width:100px;
            height:100px;
            font-size:15px;
        }
</style>
<body>

        <div class="container py-4 d-flex flex-column align-items-center justify-content-center">
    <!-- Carte principale -->
            <div class="card shadow-sm col-12 col-lg-6">
                  <!-- Bouton retour -->
            <div class="mb-3" style="position: relative;">
                <a href="/admin_dashboard" class="btn btn-outline-primary btn-sm">
                    ← Retour à la liste
                </a>
            </div>
                <div class="card-body">

                    <!-- Titre -->
                    <h2 class="card-title mb-3">
                        {{ event.name }}
                    </h2>

                    <!-- Infos principales -->
                        <div class="col-md-6 mb-2 d-flex" >
                            <div class="first_div">
                                <p>Événement
                                <strong class="mb-4">{{ event.name }} </strong></p>
                                <p>Date : <strong class="mb-4">{{ event.date }} </strong></p>
                                <p>Groupe : <strong class="mb-2">{{ event.groups.name}}</strong></p>
                                <p>Invités: <strong class="mb-2">{{event.guests|length}}</strong></p>
                                <p>Status : <strong class="mb-2">{{event.state}}</strong></p>
                            </div>
                    </div>

                    <!-- Actions -->
                    <div class="d-flex gap-2">
                        <a href="/edit_event/{{ event.id }}" class="btn btn-primary">
                            Modifier
                        </a>
                        {%if curent_user_role == "admin"%}
                        <form action="/delete_event/{{ event.id }}" method="post">
                            <button type="submit" onclick="return confirm ('voulez-vous supprimer cet evenement')" class="btn btn-danger">
                                Supprimer
                            </button>
                        </form>
                        {%endif%}
                    </div>

                </div>
            </div>
        </div>

</body>
</html>
