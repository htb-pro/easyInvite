<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .event-card { transition: transform 0.2s; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .event-card:hover { transform: translateY(-5px); }
        .hero-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 3rem 0; }
    </style>
</head>
<body>

<div class="hero-section text-center">
    <h1>Découvrez nos prochains événements</h1>
    <p>Réservez vos places en quelques clics</p>
</div>

<div class="container my-5">
    <div class="row mb-5 justify-content-center">
        <div class="col-md-8">
            <form class="d-flex gap-2">
                <input class="form-control form-control-lg" type="search" placeholder="Rechercher un événement...">
                <button class="btn btn-primary btn-lg" type="submit">Rechercher</button>
            </form>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col">
            <div class="card event-card h-100">
                <img src="https://via.placeholder.com/400x200" class="card-img-top" alt="Event">
                <div class="card-body">
                    <h5 class="card-title fw-bold">Nom de l'événement</h5>
                    <p class="text-muted"><i class="bi bi-calendar-event"></i> 12 Juin 2026</p>
                    <p class="card-text">Courte description de l'événement pour donner envie au participant...</p>
                </div>
                <div class="card-footer bg-white border-0 pb-3">
                    <a href="#" class="btn btn-outline-primary w-100">Voir les détails</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
