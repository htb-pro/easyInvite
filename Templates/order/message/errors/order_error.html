<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #0b1c2d; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { background-color: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="card error-card p-5 rounded-4 shadow-lg mx-auto" style="max-width: 500px;">
        <i class="bi bi-exclamation-triangle-fill text-warning fs-1"></i>
        <h2 class="mt-3 fw-bold">Oups !</h2>
        <p class="text-light opacity-75">
            {{ detail if detail else "Cette commande n'existe plus ou a été supprimée." }}
        </p>
        <div class="mt-4">
            <a href="/payments/{{event_id}}" class="btn btn-primary px-4">
                <i class="bi bi-house-door-fill"></i> Au formulaire de commande
            </a>
        </div>
    </div>
</div>

</body>
</html>
