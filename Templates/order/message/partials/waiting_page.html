<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File d'attente - Billetterie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .waiting-card { box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 15px; }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="card waiting-card p-5 shadow-sm">
        <div class="spinner-border text-primary mb-4" role="status"></div>
        <h2 class="fw-bold">Affluence élevée</h2>
        <p class="text-muted">Vous êtes dans la file d'attente. Merci de ne pas actualiser cette page.</p>
        <div class="progress mt-3" style="height: 20px;">
            <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%"></div>
        </div>
        <p class="mt-3 small text-secondary">Votre position sera mise à jour automatiquement.</p>
    </div>
</div>

<script>
    // Rafraîchit la page toutes les 5 secondes pour vérifier l'accès
    setTimeout(function() {
        window.location.reload();
    }, 5000);
</script>

</body>
</html>
