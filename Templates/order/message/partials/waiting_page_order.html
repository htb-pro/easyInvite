<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File d'attente - Billetterie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .waiting-card { background-color: #1e1e1e; border: 1px solid #2d2d2d; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border-radius: 15px; max-width: 500px; width: 100%; }
        /* Style personnalisé pour rappeler ton bouton orange */
        .progress-bar-orange { background-color: #ff9f1c !important; }
        .text-orange { color: #ff9f1c !important; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card waiting-card p-5 text-center">
        <div class="spinner-border text-orange mb-4" style="width: 3rem; height: 3rem;" role="status"></div>
        
        <h2 class="fw-bold mb-3 text-white">Préparation de votre billet</h2>
        <p class="text-secondary">Le serveur dessine vos accès uniques. Merci de ne pas fermer cette page.</p>
        
        <div class="progress mt-4" style="height: 12px; background-color: #2d2d2d;">
            <div class="progress-bar progress-bar-striped progress-bar-animated progress-bar-orange" style="width: 100%"></div>
        </div>
        
        <p id="status-text" class="mt-4 small text-light">Vérification de la disponibilité dans 5 secondes...</p>
    </div>
</div>

<script>
    const ticketId = "{{ ticket_id }}";
    const orderId = "{{ order_id }}";
    const targetUrl = `/download/order/${orderId}`;
    let countdown = 5;

    // Compte à rebours visuel pour l'utilisateur
    setInterval(() => {
        if (countdown > 0) {
            countdown--;
            document.getElementById('status-text').innerText = `Prochaine tentative dans ${countdown} seconde(s)...`;
        }
    }, 1000);

    async function checkStatus() {
        try {
            const response = await fetch(targetUrl);

            if (response.status === 202) {
                // Le worker n'a pas fini, on réinitialise le chrono et on attend 5s de plus
                countdown = 5;
                setTimeout(checkStatus, 5000);
            } 
            else if (response.status === 200) {
                // Le PDF est prêt ! On le télécharge
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Billet_${ticketId}.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();

                // 🎯 ICI ON MODIFIE LA PAGE : Le téléchargement est réussi, on arrête tout !
                document.getElementById('status-text').innerHTML = "<span class='text-success fw-bold'> Téléchargement terminé ! Vous pouvez fermer cet onglet.</span>";
                document.querySelector('.spinner-border').className = "bi bi-check-circle text-success mb-4 fs-1"; // Optionnel : icône succès
                document.querySelector('.progress-bar').className = "progress-bar bg-success"; 
            } 
            else {
                document.getElementById('status-text').innerText = " Une erreur est survenue lors de la récupération.";
            }
        } catch (e) {
            document.getElementById('status-text').innerText = " Connexion au serveur interrompue. Nouvelle tentative...";
            setTimeout(checkStatus, 5000);
        }
    }

    // Lance la première vérification après 5 secondes
    setTimeout(checkStatus, 5000);
</script>

</body>
</html>
