<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Scanner Invitation</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/Css/bootstrap.min.css">
<script src="/static/Js/html5-qrcode-master/minified/html5-qrcode.min.js" defer></script>
<script src="/static/Js/index.js" defer></script>
<!-- Bootstrap -->
<script src="/static/Js/bootstrap.bundle.js" defer></script>
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background-color: #0b1c2d;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== BACKGROUND GEOMETRIQUE ===== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
        linear-gradient(225deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
        linear-gradient(315deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%);
      background-size: 120px 120px;
      z-index: 0;
    }
.card{
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    background-color:rgba(0,0,0,0.4);
}

#reader{
    border-radius:15px;
    overflow:hidden;
}
#reader .html5-qrcode-camera-selector{
    position: relative;
    z-index: 1;
    color :white;
}

.result-box{
    margin-top:20px;
    font-size:18px;
}
#reader__dashboard_section_csr span,#html5-qrcode-anchor-scan-type-change
{
    color: white;
}
.result-link{
    display:block;
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    font-weight:600;
    transition:.2s;
}
#reader__dashboard_section_csr button
{
    height: 2rem;
    background-color: rgb(41, 41, 238);
    color: white;
    border: none;
    border-radius: 10px;
}
</style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand">
            <i class="bi bi-qr-code-scan me-2"></i>
            Vérifier l’invitation
        </span>
    </div>
</nav>
<div class="container d-flex justify-content-center align-items-center" style="position: relative;">
        <button type="button" id="show-form" class="col-12  col-md-12 col-lg-6 mt-5 btn btn-primary ">
            <span><i class="bi bi-chevron-down"></i> Vérifier le code d'accès</span>
        </button>
</div>

<div class="container mt-4 px-3 d-flex justify-content-center align-items-center"  data-aos = "fade-up">
    <div class="col-12  col-md-12 col-lg-6  form-section ">
        <div class="card shadow p-4 mb-4 text-center">
            <h5 class="fw-bold mb-3 text-light">Entree le code d'accès</h5>
            <p class="text-light" style="font-size: 45px;"><i class="bi bi-shield-lock"></i></p>
            <form method="post" action="/checkIn/get_pass">
                <input type="text" name="guest_getPass" class="form-control mb-3" placeholder="Entrez le code d'acces pour " required>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-check-circle me-2"></i>
                    Vérifier
                </button>
            </form>
        </div>
    </div>
</div>

<div class="container d-flex justify-content-center align-items-center">
    <div class="col-12 col-md-12 col-lg-6">
        <div class="card p-4 mt-4 text-center">
            <h3 class="mb-3 text-light">Scanner une invitation</h3>
            <div id="reader"></div>
            <div id="result" class="result-box"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
    AOS.init({
        delay:"400"
    })
</script>
</body>
</html>
