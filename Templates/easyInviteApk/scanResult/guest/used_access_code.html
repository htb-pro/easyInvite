<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code déjà utilisé</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   <meta http-equiv="refresh" content="3;url=/scan_view">
</head>
<style>
body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      background-color: #0b1c2d;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== BACKGROUND GEOMETRIQUE ===== */
body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
        linear-gradient(225deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
        linear-gradient(315deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%);
      background-size: 120px 120px;
      z-index: 0;
}
.card
{
    background-color:  rgba(255,255,255,0.03);
}
</style>
<body>
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg text-center p-4" style="max-width: 400px;">
      <div class="card-body">
        <div class="mb-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="red" class="bi bi-exclamation-triangle-fill" viewBox="0 0 16 16">
            <path d="M8.982 1.566a1 1 0 0 0-1.964 0l-6.857 11.963c-.457.796.091 1.471.982 1.471h13.714c.89 0 1.438-.675.982-1.471L8.982 1.566zm-.982 4.434c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.08 6.995a.905.905 0 0 1 .9-.995zm.002 6a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/>
          </svg>
        </div>
        <h5 class="card-title text-danger">Code d'acces déjà utilisé</h5>
        <p class="card-text text-light">Ce code d'accès a déjà été utilisé pour cet événement.</p>
        <a href="{{ url_for('scanning') }}" class="btn btn-danger">Retour à l'accueil</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS (optionnel si tu as besoin d'interactions) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
