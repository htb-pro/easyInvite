<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <meta http-equiv="refresh" content="10;url=/scan_view"> <!--refresh and redirect to scan page-->
    <title>404 not found</title>
</head>
<style>
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      background-color: #0b1c2d;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== BACKGROUND GEOMETRIQUE ===== */
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
            linear-gradient(135deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
            linear-gradient(225deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
            linear-gradient(315deg, rgba(255,255,255,0.03) 25%, transparent 25%),
            linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%);
        background-size: 120px 120px;
        z-index: 0;
    }
    .empty-state
    {
        background-color:  rgba(255,255,255,0.3);
        margin: 0px auto;
        margin-top:15rem;
        padding:10px;
        border-radius:10px;
    }
</style>
<body>

<div class="container col-12 col-md-12 col-lg-6  d-flex flex-column  align-items-center justify-content-center" style="position:relative;">
    <div class="empty-state col-12 col-md-12 col-lg-6 d-flex flex-column  align-items-center justify-content-center ">
                <h3 class="text-danger mb-3 ">❌ QR Code invalide</h3>
                 <center><b class="text-danger" style="font-size: 25px;">404 </b></center>
          <p class="text-light text-center">
            Ce QR code est invalide .<br>
            Veuillez vérifier le QR code ou contacter l’organisateur de l’événement.
        </p>
        <a href="{{ url_for('scanning') }}" class="btn btn-primary">retourner au scan</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
