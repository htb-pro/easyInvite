<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enregistrer billet</title>
    <link href="/static/Css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .event-hero {
            position: relative;
            height: 300px;
            background-image: url('{{ event_img }}');
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .overlay {
            position: absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
        }
        .hero-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
        }
        .ticket-form {
            max-width: 500px;
            margin: auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Formulaire Achat Billet -->
    <div class="ticket-form mt-3">
        <h3 class="mb-4">Enregistrer le prix de billet</h3>
        <form action="/submit_ticket/{{event_id}}" method="post">
            {%if success %}
            <div class="alert alert-success">
                {{success}}
                
            </div>
            {%endif%}
            {%if message %}
            <div class="alert alert-danger">
                {{message}}
            </div>
            {%endif%}          
            <div class="mb-3">
                <label for="ticket_type" class="form-label">Type de billet</label>
                <select name="ticket_type" id="" class="form-control">
                    <option value="" selected>--choisir le type--</option>
                    <option value="standard">Standard</option>
                    <option value="vip">VIP</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="price" class="form-label">Prix</label>
                <input type="number" class="form-control" id="price" name="price" required>
            </div>
            <div class="mb-3">
                <label for="device" class="form-label">devise</label>
                <select name="device" id="" class="form-control">
                    <option value="" selected>--choisir la devise--</option>
                    <option value="CDF">Fc</option>
                    <option value="USD">dollars</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
        </form>
    </div>

</div>
    

<script>
    setTimeout(() => {
        const alert = document.querySelector(".alert");
        if (alert) {
            alert.classList.remove("show");
            alert.classList.add("fade");
            setTimeout(() => alert.remove(), 500);
        }
    }, 3000); // disparaît après 3 secondes
</script>
</body>
</html>
