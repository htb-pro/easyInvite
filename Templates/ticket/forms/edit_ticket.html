<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Créer une invitation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static',path='Css/bootstrap.min.css')}}">
  <style>
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      background-color: #0b1c2d;
      position: relative;
      overflow-x: hidden;
    }
    /* ===== BACKGROUND GEOMETRIQUE ===== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
        linear-gradient(225deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
        linear-gradient(315deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%);
      background-size: 120px 120px;
      z-index: 0;
    }
    .card
    {
         background-color : rgb(0,0,0,0.2);
         color : white;
    }
    .header{
      background: linear-gradient(135deg, #1f3c88, #2c6bed);
      color: white;
      padding: 15px;
      position: relative;
      z-index: 2;
    }
    .btn-send {
      background-color: #2c6bed;
      color: white;
    }
    .btn-send:hover
    {
      background-color: #13397a;
    }
    .referenceName
    {
      display: none;
    }
  </style>
</head>

<body>
<!-- HEADER -->
<!-- FORM -->
<div class="container mt-4 mb-5">
  <div class="card shadow-sm">
      <span class="mt-2 text-center"> 📩 Nouvel Invité</span>
    <div class="card-body">
      <form method="post" action="/edit/ticket" >
     
        {% if uniqueValueError %}
        <div class="alert alert-danger">
                <p>{{uniqueValueError}}</p>
          </div>
        {%endif%}
        {% if creation_message %}
        <div class="alert alert-success">
                <p>{{creation_message}}</p>
          </div>
        {%endif%}
        <!-- NAME -->
         <input type="hidden" name="event_id" value="{{event_id}}">
         <input type="hidden" name="ticket_id" value="{{ticket.id}}">
         {%if ticket.order_id%}
         <div class="mb-3 guest_name">
          <label class="form-label">Commande</label>
          <input type="text" class="form-control" name="order_id" value="{{ticket.order_id}}"  readonly>
        </div>
        {%endif%} 
        <div class="mb-3 guest_name">
          <label class="form-label">Nom complet</label>
          <input type="text" class="form-control" name="buyer_name" value="{{ticket.participator_name}}"  required>
        </div> 
        {% if ticket.orders.buyer_number %}
        <div class="mb-3 guest_name">
          <label class="form-label">Telephone</label>
          <input type="tel" class="form-control" name="buyer_phone" value="{{ticket.orders.buyer_number}}"  required>
        </div>
        {% endif %}
           <!-- type -->
        <div class="mb-3 guest_type_div">
          <label class="form-label">Type de billet</label>
          <select class="form-select" name="ticket_type"  required>
            <option value="">--Choisir le type de billet--</option>
            {% for ticket_price in ticket_prices %}
            <option value="{{ticket_price.ticket_type}}" {% if ticket_price.ticket_type == ticket.type or ticket_price.ticket_type == ticket.orders.ticket_type %}selected{%endif%}>{{ticket_price .ticket_type}} {{ticket_price .price|int}} {{ticket_price .device}}</option>
            {%endfor%}     
          </select>
        </div>

        
        <!-- SUBMIT -->
        <div class="d-grid">
          <button type="submit" class="btn btn-send">
            📤 Enregistrer
          </button>
        </div>

      </form>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    setTimeout(() => {
        const alert = document.querySelector(".alert");
        if (alert) {
            alert.classList.remove("show");
            alert.classList.add("fade");
            setTimeout(() => alert.remove(), 500);
        }
    }, 3000); // disparaît après 3 secondes
</script>
</body>
</html>
