<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Créer une invitation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static',path='Css/bootstrap.min.css')}}">
  <style>
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      background-color: #0b1c2d;
      position: relative;
      overflow-x: hidden;
    }
    /* ===== BACKGROUND GEOMETRIQUE ===== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
        linear-gradient(225deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
        linear-gradient(315deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%);
      background-size: 120px 120px;
      z-index: 0;
    }
    .card
    {
         background-color : rgb(0,0,0,0.2);
         color : white;
    }
    .header{
      background: linear-gradient(135deg, #1f3c88, #2c6bed);
      color: white;
      padding: 15px;
      position: relative;
      z-index: 2;
    }
    .btn-send {
      background-color: #2c6bed;
      color: white;
    }
    .btn-send:hover
    {
      background-color: #13397a;
    }
    .referenceName
    {
      display: none;
    }
  </style>
</head>

<body>
<!-- HEADER -->
<div class="header  fw-bold d-flex align-items-center" style="z-index: 1;">
  <!-- Bouton retour -->
    <div class="mb-3">
        <a href="/list_tickets/{{event.id}}" class="btn btn-outline-primary text-light btn-sm">
            ← Retour à la liste
        </a>
    </div>
</div>

{% if success is true %}
  <div id="success-alert" class="alert alert-success alert-dismissible fade show col-12 col-lg-6 container mt-2" role="alert">
      🎉 Invité créé avec succès !
  </div>
{% endif %}

<!-- FORM -->
<div class="container mt-4 mb-5">
  <div class="card shadow-sm">
      <span class="mt-2 text-center"> 📩 Nouvel Invité</span>
    <div class="card-body">
      <form method="post" action="/create/ticket" enctype="multipart/form-data">
     
        {% if uniqueValueError %}
        <div class="alert alert-danger">
                <p>{{uniqueValueError}}</p>
          </div>
        {%endif%}
        {% if creation_message %}
        <div class="alert alert-success">
                <p>{{creation_message}}</p>
          </div>
        {%endif%}
        <!-- NAME -->
         <input type="hidden" name="event_id" value="{{event.id}}">
        <div class="mb-3 guest_name">
          <label class="form-label">Nom complet</label>
          <input type="text" class="form-control" name="buyer_name" placeholder="ex : heritier bukasa "  required>
        </div> 
        <div class="mb-3 guest_name">
          <label class="form-label">Telephone</label>
          <input type="tel" class="form-control" name="buyer_phone" placeholder="ex : 243991125263 "  required>
        </div>
           <!-- type -->
        <div class="mb-3 guest_type_div">
          <label class="form-label">Type de billet</label>
          <select class="form-select" name="ticket_type"  required>
            <option value="">--Choisir le type de billet--</option>
            {% for ticket in tickets %}
            <option value="{{ticket.ticket_type}}" >{{ticket.ticket_type}} {{ticket.price|int}} {{ticket.device}}</option>
            {%endfor%}     
          </select>
        </div>

        
        <!-- SUBMIT -->
        <div class="d-grid">
          <button type="submit" class="btn btn-send">
            📤 Enregistrer
          </button>
        </div>

      </form>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    setTimeout(() => {
        const alert = document.querySelector(".alert");
        if (alert) {
            alert.classList.remove("show");
            alert.classList.add("fade");
            setTimeout(() => alert.remove(), 500);
        }
    }, 3000); // disparaît après 3 secondes
</script>
</body>
</html>
