<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement réussi - EasyInvite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .confirmation-card {
            max-width: 500px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .qr-code {
            margin: 20px 0;
            width: 200px;
            height: 200px;
        }
        .btn-home {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="confirmation-card">
        <h2 class="text-success">✅ Paiement réussi !</h2>
        <p>Merci <strong>{{buyer_name}}</strong> pour votre achat.</p>
        <p><strong>Événement :</strong> {{event_name}}</p>
        <p><strong>Numéro du billet :</strong> {{ticket_number}}</p>
        <img src="{{qr_code_url}}" alt="QR Code du billet" class="qr-code img-fluid shadow rounded">
        <p>Montant payé : <strong>{{amount}} {{currency}}</strong></p>
        <a href="/" class="btn btn-primary btn-home">Retour à l'accueil</a>
    </div>
</body>
</html>
