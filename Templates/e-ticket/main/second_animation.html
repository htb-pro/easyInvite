<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effet Flottant Meta - easyevent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f4f7fa;
            color: #000000;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        /* Conteneur principal */
        .meta-hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            padding: 20px;
        }

        /* Texte au premier plan */
        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 600px;
        }

        .hero-content h1 {
            font-weight: 800;
            font-size: 2.3rem;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        /* Style des cartes flottantes */
        .floating-card {
            position: absolute;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.09);
            border: 4px solid #ffffff;
            background-color: #e2e8f0;
            transition: transform 0.3s ease;
            z-index: 1;
        }

        .floating-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Positions et Tailles ajustées pour mobile */
        .card-1 {
            width: 130px;
            height: 130px;
            top: 6%;
            right: -15px;
            animation: floatSlow 6s ease-in-out infinite;
        }

        .card-2 {
            width: 160px;
            height: 200px;
            top: 18%;
            left: -25px;
            animation: floatFast 5s ease-in-out infinite;
            animation-delay: 1s;
        }

        .card-3 {
            width: 150px;
            height: 150px;
            bottom: 8%;
            left: -10px;
            animation: floatSlow 7s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        .card-4 {
            width: 160px;
            height: 130px;
            bottom: 6%;
            right: -15px;
            animation: floatFast 5.5s ease-in-out infinite;
            animation-delay: 1.5s;
        }

        /* Animations de flottement */
        @keyframes floatSlow {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(1.5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes floatFast {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-18px) rotate(-2.5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <section class="meta-hero">
        <div class="floating-card card-1">
            <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=400" alt="Festivités et Célébration">
        </div>
        
        <div class="floating-card card-2">
            <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=400" alt="Concert Événement">
        </div>

        <div class="floating-card card-3">
            <img src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?q=80&w=400" alt="Conférence Professionnelle">
        </div>

        <div class="floating-card card-4">
            <img src="https://images.unsplash.com/photo-1496337589254-7e19d01ced44?q=80&w=400" alt="Soirée Événementielle">
        </div>

        <div class="hero-content">
            <span class="badge bg-dark text-white rounded-pill px-3 py-2 small mb-3">🚀 Le Hub easyevent</span>
            <h1>Nous tissons les liens de tous vos événements</h1>
            <p class="text-muted small px-3 mb-4">Concerts, conférences, mariages ou festivals : gérez vos accès en toute sécurité.</p>
            <button class="btn btn-primary rounded-pill px-4 py-2 fw-bold" style="background-color: #0066ff; border: none; box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);">
                Découvrir l'expérience
            </button>
        </div>
    </section>

</body>
</html>
