<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon E-Ticket Interactif - easyevent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Hero Banner */
        .hero-section {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at top right, rgba(26, 35, 126, 0.3), transparent);
            padding: 20px;
        }

        /* Animation du dégradé de la carte (Style Meta) */
        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Conteneur 3D pour le Ticket */
        .ticket-container {
            perspective: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            touch-action: none; /* Empêche le défilement de la page pendant qu'on manipule le ticket */
        }

        .ticket-card {
            width: 100%;
            max-width: 340px;
            background: linear-gradient(-45deg, #0d0e15, #1e1b4b, #311042, #020617);
            background-size: 400% 400%;
            animation: gradientBg 12s ease infinite;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .qr-box {
            background: #ffffff;
            padding: 12px;
            border-radius: 16px;
            width: 160px;
            height: 160px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transform: translateZ(30px); /* Effet de profondeur 3D */
        }

        .qr-placeholder {
            width: 100%;
            height: 100%;
            background: #222; /* Remplacé temporairement par un bloc sombre */
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="container" data-aos="zoom-in">
            <span class="badge bg-primary px-3 py-2 rounded-pill mb-3">✨ Expérience easyTicket</span>
            <h1 class="display-5 fw-extrabold mb-3">Votre invitation pour <br><span id="typed-text" class="text-primary fw-bold"></span></h1>
            <p class="text-muted col-lg-6 mx-auto">Bougez ou touchez l'écran pour interagir avec votre badge d'accès sécurisé.</p>
        </div>
    </section>

    <div class="container text-center mb-5">
        <div class="ticket-container" data-aos="fade-up" data-aos-delay="200">
            <div class="ticket-card" id="ticket">
                <div class="ticket-header">
                    <span class="fw-bold text-uppercase tracking-wider small text-white-50">E-Ticket Officiel</span>
                    <span class="badge bg-danger px-2 py-1">ACCÈS VIP</span>
                </div>
                <div class="ticket-body text-center">
                    <h4 class="fw-bold mb-1 text-white">Dale Guthrie</h4>
                    <p class="text-info small mb-4">💍 Mariage de Jaime & Nolan</p>
                    
                    <div class="qr-box">
                        <div class="qr-placeholder"></div>
                    </div>
                    
                    <p class="text-white-50 small mt-4 mb-0">Dimanche, 19 Juillet 2026 à 21:42</p>
                </div>
                <div class="ticket-header my-3" style="border-bottom: 2px dashed rgba(255,255,255,0.1); padding:0;"></div>
                <div class="ticket-footer text-center">
                    <code class="text-primary fw-bold small">INV-cfa60fd4-4c19-40d0-81e4</code>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Initialisation des animations au défilement
        AOS.init({ duration: 1000, once: true });

        // Effet machine à écrire
        new Typed('#typed-text', {
            strings: ['le grand jour !', 'un moment magique.', 'le Mariage de l\'année.'],
            typeSpeed: 60,
            backSpeed: 40,
            loop: true
        });

        // Logique de l'effet gyroscopique / Tactile 3D (Optimisé pour téléphone)
        const ticket = document.getElementById('ticket');
        const container = document.querySelector('.ticket-container');

        // Gestion du toucher sur mobile (Touch Events)
        container.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            
            // Calculer la position du doigt par rapport au centre de la carte
            const x = touch.clientX - rect.left - (rect.width / 2);
            const y = touch.clientY - rect.top - (rect.height / 2);
            
            // Conversion en degrés de rotation
            const rotateX = -(y / rect.height) * 30; 
            const rotateY = (x / rect.width) * 30;

            ticket.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // Réinitialisation de la carte dès que le doigt quitte l'écran
        container.addEventListener('touchend', () => {
            ticket.style.transition = "transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
            ticket.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });

        container.addEventListener('touchstart', () => {
            ticket.style.transition = "none";
        });
    </script>
</body>
</html>
