<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouvelle Invitation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="/static/Css/bootstrap.min.css">
  <script src="/static/Js/event_forms.js" defer></script>
    <style>
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      background-color: #0b1c2d;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== BACKGROUND GEOMETRIQUE ===== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
        linear-gradient(225deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
        linear-gradient(315deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%);
      background-size: 120px 120px;
      z-index: 0;
    }
    .card
    {
         background-color : rgb(0,0,0,0.2);
         color : white;
    } 
    </style>
</head>
<body>

<div class="container py-4">

    <!-- Header -->
    <div class="mb-4 text-center text-light">
        <h4 class="fw-bold">📩 Créer un evenement</h4>
        <p class="text-light">Remplissez les informations ci-dessous pour la création d'un événement</p>
    </div>

    <!-- Formulaire -->
    <div class="card shadow-sm rounded-4 p-4">

        <form method="post" action="/create_event" enctype="multipart/form-data">
            {% block content %}
            {%if dateError %}
            <div class="alert alert-danger">
                <p>{{dateError}}</p>
            </div>
            {%endif%}
            {%if error %}
            <div class="alert alert-danger">
                <p>{{error}}</p>
            </div>
            {%endif%}
<div class="mb-3">
                <label for="lieu" class="form-label fw-semibold">Type d'evenement</label>
                <select name="eventType" id="event_type" class="form-select">
                        <option selected >--choisir le type d'evenement--</option>
                        <option value="Mariage" {%if eventType == "Mariage"%}selected{%endif%}>Mariage</option>
                        <option value="Concours" {%if eventType == "Concours"%}selected{%endif%}>Concours</option>
                        <option value="Anniversaire" {%if eventType == "Anniversaire"%}selected{%endif%}>Anniversaire</option>
                        <option value="Conference" {%if eventType == "Conference"%}selected{%endif%}>Conference</option>
                        <option value="Reunion" {%if eventType == "Reunion"%}selected{%endif%}>Reunion</option>
                        <option value="Autres" {%if eventType == "Autres"%}selected{%endif%}>Autres</option>
                </select>
            </div>

            <!-- Titre de l'événement -->
            <div class="mb-3">
                <label for="titre" class="form-label fw-semibold">Nom de l'événement</label>
                <input type="text" class="form-control" id="titre" name="eventName" value="{{eventName}}" placeholder="Ex : Gala 2026" required>
            </div>
            <!-- nom du couple -->
            <div class="mb-3 couple_name">
                <label for="titre" class="form-label fw-semibold">Nom du couple</label>
                <input type="text" class="form-control" id="titre" name="couple_name" value="{{couple}}" placeholder="Ex : x et y" required>
            </div>
            <div class="mb-3 couple_number">
                <label for="titre" class="form-label fw-semibold">Numéro de téléphone du couple</label>
                <input type="text" class="form-control" id="titre" name="couple_phone_number"  placeholder="Ex : 24399xxxxxxx" required>
            </div>
            <!-- Date de l'événement -->
            <div class="mb-3">
                <label for="datetime-local" class="form-label fw-semibold">Date de l'événement</label>
                <input type="datetime-local" class="form-control" id="date" name="eventDate" value="{{eventDate}}" required>
            </div>

            <!-- Lieu de l'événement -->
            <div class="mb-3">
                <label for="Addresse" class="form-label fw-semibold">Addresse</label>
                <input type="text" class="form-control" id="lieu" name="eventAddress" placeholder=" Ex : av : xxx commune : xxx ville : xxx" value="{{eventAddress}}" required>
            </div>
            <!-- Titre de l'événement -->
             <div class="mb-3">
                <label for="location" class="form-label fw-semibold">Salle</label>
                <input type="text" class="form-control" id="location" name="location" placeholder=" Ex : salle du royaume" value="{{eventLocation}}" required>
            </div>
             <!-- photo du couple -->
             <div class="mb-3 event_img">
                <label class="form-label">Choisir une image du couple</label>
                <input 
                    class="form-control "
                    type="file"
                    name="photo"
                    accept="image/*">
            </div>
             <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="is_active" name="is_active">
                <label class="form-check-label" for="is_active">
                    cadeau en espèce
                </label>
            </div>
            <!-- Description / Informations supplémentaires -->
            <div class="mb-3">
                <label for="description" class="form-label fw-semibold">Description (optionnel)</label>
                <textarea class="form-control" id="description" name="eventDescription" value="{{eventDescription}}" rows="3" placeholder="Informations supplémentaires"></textarea>
            </div>
            {%endblock%}
            <!-- Boutons -->
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary rounded-pill">💾 Enregistrer l'évènement</button>
                <a href="{{url_for('event_list')}}" class="btn btn-outline-secondary rounded-pill">↩️ Retour à la liste</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
