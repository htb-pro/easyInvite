<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouvelle Invitation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="/static/Css/bootstrap.min.css">
    <script src="/static/Js/event_forms.js" defer></script>
    <style>
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      background-color: #0b1c2d;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== BACKGROUND GEOMETRIQUE ===== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
        linear-gradient(225deg, rgba(255,255,255,0.03) 25%, transparent 25%) -60px 0,
        linear-gradient(315deg, rgba(255,255,255,0.03) 25%, transparent 25%),
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%);
      background-size: 120px 120px;
      z-index: 0;
    }
    .card
    {
         background-color : rgb(0,0,0,0.2);
         color : white;
         z-index: 1;
} 
    </style>
</head>
<body >

<div class="container py-4" >

    <!-- Header -->
    <div class="mb-4 text-center text-light">
        <h4 class="fw-bold">📩 Modification d'un evenement</h4>
        <p class="text-light">Remplissez les informations ci-dessous pour appliquer la Modification</p>
    </div>

    <!-- Formulaire -->
    <div class="card shadow-sm rounded-4 p-4" style="position: relative;">

        <form method="post" action="/edit_event/{{event.id}}" enctype="multipart/form-data">
             {%if dateError %}
                <div class="alert alert-danger">
                    <p>{{dateError}}</p>
                </div>
            {% endif%}
             {%if error %}
                <div class="alert alert-danger">
                    <p>{{Error}}</p>
                </div>
            {% endif%}
            {%if img_error %}
                <div class="alert alert-danger">
                    <p>{{img_error}}</p>
                </div>
            {% endif%}
            {%if success %}
                <div class="alert alert-success">
                    <p>{{success}}</p>
                </div>
            {% endif%}
            <div class="mb-3">
                <label for="lieu" class="form-label fw-semibold">Type d'evenement</label>
                <select name="eventType" id="event_type" class="form-select">
                    <option value="Mariage"{%if event.type == 'Mariage' %}selected{%endif%}>Mariage</option>
                    <option value="Concours"{%if event.type == 'Concours' %}selected{%endif%}>Concours</option>
                    <option value="Anniversaire" {%if event.type == 'Anniversaire' %}selected{%endif%}>Anniversaire</option>
                    <option value="Conference"{%if event.type == 'Conference' %}selected{%endif%}>Conference</option>
                    <option value="Reunion"{%if event.type == 'Reunion' %}selected{%endif%}>Reunion</option>
                    <option value="Autres" {%if event.type == 'Autres' %}selected{%endif%}>Autres</option>
                </select>
            </div>
            <!-- Titre de l'événement -->
            <div class="mb-3">
                <label for="titre" class="form-label fw-semibold">Nom de l'événement</label>
                <input type="text" class="form-control" id="titre" name="eventName" placeholder="Ex : Gala 2026" value="{{event.name}}" required>
            </div>

            <!-- nom couple -->
            <div class="mb-3 couple_name">
                <label for="titre" class="form-label fw-semibold">Nom du couple</label>
                <input type="text" class="form-control" id="couple" name="coupleName" placeholder="Ex : Gala 2026" value="{{event.couple_name}}" required>
            </div>
            <div class="mb-3 couple_number">
                <label for="titre" class="form-label fw-semibold">Numéro de téléphone du couple</label>
                <input type="text" class="form-control" id="titre" name="couple_phone_number"  placeholder="Ex : 24399xxxxxxx" value="{{event.couple_phone_number}}" required>
            </div>
            <!-- Date de l'événement -->
            <div class="mb-3">
                <label for="date" class="form-label fw-semibold">Date de l'événement</label>
                <input type="datetime-local" class="form-control" id="date" name="eventDate" value="{{event.date}}" required>
            </div>
            <!-- salle de l'evenement -->
            <div class="mb-3">
                <label for="location" class="form-label fw-semibold">Salle</label>
                <input type="text" class="form-control" id="location" name="location"  value="{{event.location}}" required>
            </div>

            <!-- Lieu de l'événement -->
            <div class="mb-3">
                <label for="lieu" class="form-label fw-semibold">Addresse</label>
                <input type="text" class="form-control" id="lieu" name="eventAddress" placeholder="Ex : av : xxx commune : xxx ville : xxx" value="{{event.address}}" required>
            </div>

            <!-- statut de l'événement -->
               <div class="mb-3">
                    <label for="lieu" class="form-label fw-semibold">State</label>
                    <select name="eventState" id="eventState" class="form-select">
                        <option  value="en attente" {%if event.state == "en attente"%}selected{%endif%}>en attente</option>
                        <option  value="en cours" {%if event.state == "en cours"%}selected{%endif%}>en cours</option>
                        <option value="terminé" {%if event.state == "terminé"%}selected{%endif%}>terminé</option>
                    </select>
                </div>
                  <div class="mb-3 event_img">
                    <label class="form-label">Choisir une image du couple</label>
                    <input 
                        class="form-control"
                        type="file"
                        name="photo"
                        accept="image/*" >
                </div>
                       <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="is_active" name="is_active"  {%if event.guest_present%} checked{%endif%}>
                <label class="form-check-label" for="is_active">
                    cadeau en espèce
                </label>
                </div>
            <!-- Description / Informations supplémentaires -->
            <div class="mb-3">
                <label for="description" class="form-label fw-semibold">Description (optionnel)</label>
                <textarea class="form-control" id="description" name="eventDescription" rows="3" value="{{event.description}}" placeholder="Informations supplémentaires"></textarea>
            </div>

            <!-- Boutons -->
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary rounded-pill">💾 Enregistrer l'invitation</button>
                <a href="{{url_for('event_list')}}" class="btn btn-outline-secondary rounded-pill">↩️ Retour à la liste</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
